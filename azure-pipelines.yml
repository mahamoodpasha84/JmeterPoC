# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest


steps:
- script: |
    sudo apt-get update && sudo apt-get install -y wget unzip
    # Download and install Apache JMeter
    JMETER_VERSION=5.6.3
    wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-$JMETER_VERSION.tgz
    tar -xvzf apache-jmeter-$JMETER_VERSION.tgz
    sudo mv apache-jmeter-$JMETER_VERSION /opt/jmeter
    /opt/jmeter/bin/jmeter -v
  displayName: 'Install Apache JMeter'

- script: |
    # Run JMeter test plan (.jmx script)
    /opt/jmeter/bin/jmeter -n -t $(Build.SourcesDirectory)/Azure-auth-poc.jmx \
      -l $(Build.SourcesDirectory)/results.jtl \
      -e -o $(Build.SourcesDirectory)/report
  displayName: 'Run JMeter Test Plan'

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.SourcesDirectory)/report'
    ArtifactName: 'jmeter-report'
    publishLocation: 'Container'
  displayName: 'Publish JMeter HTML Report'

 
